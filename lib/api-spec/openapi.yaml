components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
      required: [username, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user]

    NotificationItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        isUnread:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        href:
          type: string
        actor:
          anyOf:
            - $ref: "#/components/schemas/UserSummary"
            - type: "null"
      required: [id, type, title, body, createdAt, isUnread, href]

    ActivitySummary:
      type: object
      properties:
        unreadMessages:
          type: integer
        unreadNotifications:
          type: integer
        recentItems:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
      required: [unreadMessages, unreadNotifications, recentItems]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        profileType:
          type: string
          enum: [user, artist]
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        followerCount:
          type: integer
        friendCount:
          type: integer
        followingCount:
          type: integer
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        bannerUrl:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        work:
          type: string
          nullable: true
        school:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
        interests:
          type: array
          items:
            type: string
        hasArtistPage:
          type: boolean
        accentColor:
          type: string
          nullable: true
        themeName:
          type: string
          nullable: true
        onboardingCompleted:
          type: boolean
        onboardingStep:
          type: string
        links:
          type: array
          items:
            $ref: "#/components/schemas/LinkItem"
        featuredContent:
          type: string
          nullable: true
      required: [id, username, email, profileType, isAdmin, isBanned, followerCount, friendCount, followingCount, postCount, createdAt]

    LinkItem:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
      required: [label, url]

    PageLinkItem:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
        kind:
          type: string
          nullable: true
      required: [label, url]

    ServiceItem:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        turnaround:
          type: string
          nullable: true
      required: [title]

    SectionConfig:
      type: object
      properties:
        visible:
          type: boolean
        style:
          type: string
          nullable: true
        density:
          type: string
          nullable: true

    FeaturedContent:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        postId:
          type: integer
          nullable: true
        imageUrl:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
      required: [type]

    PageBuilderState:
      type: object
      properties:
        identity:
          type: object
          properties:
            pageType:
              type: string
            pageArchetype:
              type: string
            pageStatus:
              type: string
          required: [pageType, pageArchetype, pageStatus]
        showcase:
          type: object
          properties:
            featuredContent:
              $ref: "#/components/schemas/FeaturedContent"
              nullable: true
            linkItems:
              type: array
              items:
                $ref: "#/components/schemas/PageLinkItem"
          required: [linkItems]
        work:
          type: object
          properties:
            primaryActionType:
              type: string
            primaryActionLabel:
              type: string
            primaryActionUrl:
              type: string
              nullable: true
            serviceItems:
              type: array
              items:
                $ref: "#/components/schemas/ServiceItem"
            pricingSummary:
              type: string
              nullable: true
            turnaroundInfo:
              type: string
              nullable: true
          required: [primaryActionType, primaryActionLabel, serviceItems]
        style:
          type: object
          properties:
            accentColor:
              type: string
              nullable: true
            moodPreset:
              type: string
            backgroundStyle:
              type: string
            lightThemeVariant:
              type: string
            layoutTemplate:
              type: string
            fontPreset:
              type: string
            enabledModules:
              type: array
              items:
                type: string
            moduleOrder:
              type: array
              items:
                type: string
            sectionConfigs:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/SectionConfig"
          required: [moodPreset, backgroundStyle, lightThemeVariant, layoutTemplate, fontPreset, enabledModules, moduleOrder, sectionConfigs]
      required: [identity, showcase, work, style]

    ProfileCustomField:
      type: object
