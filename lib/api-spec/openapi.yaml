openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ArtistHub Social Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: posts
    description: Post management
  - name: artists
    description: Artist profiles
  - name: messages
    description: Direct messaging
  - name: search
    description: Search and discovery
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/update:
    post:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{userId}/unfollow:
    post:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unfollowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{userId}/followers:
    get:
      operationId: getFollowers
      tags: [users]
      summary: Get user followers
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

  /users/{userId}/following:
    get:
      operationId: getFollowing
      tags: [users]
      summary: Get users that this user follows
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

  /feed:
    get:
      operationId: getFeed
      tags: [posts]
      summary: Get chronological feed for current user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsResponse"

  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post by ID
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts/{postId}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts/{postId}/unlike:
    post:
      operationId: unlikePost
      tags: [posts]
      summary: Unlike a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unliked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{userId}/posts:
    get:
      operationId: getUserPosts
      tags: [posts]
      summary: Get posts by a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: User posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsResponse"

  /artists:
    get:
      operationId: getArtists
      tags: [artists]
      summary: List/search artists
      parameters:
        - name: location
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Artists list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistsResponse"

  /artists/{userId}:
    get:
      operationId: getArtistProfile
      tags: [artists]
      summary: Get artist profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /artists/{userId}/update:
    post:
      operationId: updateArtistProfile
      tags: [artists]
      summary: Update artist profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArtistRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"

  /artists/{userId}/gallery:
    post:
      operationId: addGalleryItem
      tags: [artists]
      summary: Add a gallery item to artist profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItemRequest"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"

  /artists/{userId}/gallery/{itemId}:
    delete:
      operationId: deleteGalleryItem
      tags: [artists]
      summary: Delete a gallery item
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations for current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/conversations/{conversationId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message (or start conversation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/book/{artistId}:
    post:
      operationId: sendBookingInquiry
      tags: [messages]
      summary: Send a booking inquiry to an artist
      parameters:
        - name: artistId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInquiryRequest"
      responses:
        "201":
          description: Inquiry sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search users and artists
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [all, users, artists]
            default: all
        - name: location
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Admin - list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"

  /admin/posts:
    get:
      operationId: adminGetPosts
      tags: [admin]
      summary: Admin - list all posts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsResponse"

  /admin/posts/{postId}:
    delete:
      operationId: adminDeletePost
      tags: [admin]
      summary: Admin - delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{userId}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      summary: Admin - ban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{userId}/unban:
    post:
      operationId: adminUnbanUser
      tags: [admin]
      summary: Admin - unban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        profileType:
          type: string
          enum: [user, artist]
      required: [username, email, password, profileType]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        profileType:
          type: string
          enum: [user, artist]
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        followerCount:
          type: integer
        followingCount:
          type: integer
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, profileType, isAdmin, isBanned, followerCount, followingCount, postCount, createdAt]

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        profileType:
          type: string
          enum: [user, artist]
        followerCount:
          type: integer
      required: [id, username, profileType, followerCount]

    UserProfile:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        isFollowing:
          type: boolean
        artistProfile:
          $ref: "#/components/schemas/ArtistProfile"
          nullable: true
      required: [user, isFollowing]

    UpdateProfileRequest:
      type: object
      properties:
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    Post:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        content:
          type: string
        imageUrl:
          type: string
          nullable: true
        likeCount:
          type: integer
        isLiked:
          type: boolean
        author:
          $ref: "#/components/schemas/UserSummary"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, content, likeCount, isLiked, author, createdAt]

    CreatePostRequest:
      type: object
      properties:
        content:
          type: string
        imageUrl:
          type: string
          nullable: true
      required: [content]

    PostsResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [posts, total, page, totalPages]

    ArtistProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        category:
          type: string
        location:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        bio:
          type: string
          nullable: true
        bookingEmail:
          type: string
          nullable: true
        gallery:
          type: array
          items:
            $ref: "#/components/schemas/GalleryItem"
        user:
          $ref: "#/components/schemas/UserSummary"
      required: [id, userId, category, tags, gallery, user]

    UpdateArtistRequest:
      type: object
      properties:
        category:
          type: string
        location:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        bio:
          type: string
          nullable: true
        bookingEmail:
          type: string
          nullable: true

    GalleryItem:
      type: object
      properties:
        id:
          type: integer
        artistId:
          type: integer
        type:
          type: string
          enum: [image, video, audio]
        url:
          type: string
        caption:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, artistId, type, url, createdAt]

    GalleryItemRequest:
      type: object
      properties:
        type:
          type: string
          enum: [image, video, audio]
        url:
          type: string
        caption:
          type: string
          nullable: true
      required: [type, url]

    ArtistsResponse:
      type: object
      properties:
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistProfile"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [artists, total, page, totalPages]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        otherUser:
          $ref: "#/components/schemas/UserSummary"
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        unreadCount:
          type: integer
      required: [id, otherUser, unreadCount]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        isBookingInquiry:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, senderId, content, isBookingInquiry, createdAt]

    SendMessageRequest:
      type: object
      properties:
        recipientId:
          type: integer
        content:
          type: string
      required: [recipientId, content]

    BookingInquiryRequest:
      type: object
      properties:
        eventDate:
          type: string
          nullable: true
        eventLocation:
          type: string
          nullable: true
        eventType:
          type: string
          nullable: true
        message:
          type: string
      required: [message]

    SearchResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistProfile"
        total:
          type: integer
      required: [users, artists, total]

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [users, total, page, totalPages]
